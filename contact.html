<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Student Productivity & Portfolio</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation Bar -->

    <nav>
        <h2>Student Productivity & Portfolio</h2>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Contact Section -->

    <section class="contact">

        <h1>Contact Me</h1>

        <p>
            Feel free to contact me by filling out the form below.
        </p>

        <form id="contactForm">

            <label>Full Name</label><br>
            <input type="text" id="name" placeholder="Enter your name">
            <label>Email</label><br>
            <input type="email" id="email" placeholder="Enter your email">
            <label>Phone Number</label><br>
            <input type="tel" id="phone" placeholder="Enter your phone number">
            <label>Subject</label><br>
            <input type="text" id="subject" placeholder="Enter subject">
            <label>Message</label><br>
            <textarea id="message" rows="5" placeholder="Write your message"></textarea>
            <button type="submit">Submit</button>

        </form>
        <p id="formMsg"></p>

    </section>


<script src="script.js"></script>
</body>

</html>
